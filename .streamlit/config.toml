[server]
headless = true
address = "0.0.0.0"
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Pinned dark "terminal" palette. Pinning base = "dark" (instead of inheriting the
# browser preference) makes the native chart theme — st.altair_chart(theme="streamlit")
# and st.pydeck_chart — deterministically match the app's fonts, gridlines and background.
[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1b2027"
textColor = "#e6edf3"
